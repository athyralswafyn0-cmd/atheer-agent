  # === PARTNER SERVICE (duplicate removed, already defined above) ===
  # === API GATEWAY ===
  - type: web
    name: atheer-agent-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: |
      cd packages/api && pnpm install --frozen-lockfile && pnpm exec prisma generate && pnpm run build
    startCommand: |
      cd packages/api && npx prisma generate && npx prisma db push --force-reset --accept-data-loss && PORT=10000 pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - fromDatabase:
          name: atheer-db
          property: connectionString
        key: DATABASE_URL
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
      # Service URLs for inter-service communication
      - key: AUTH_SERVICE_URL
        value: "https://auth-service.onrender.com"
      - key: TENANT_SERVICE_URL
        value: "https://tenant-service.onrender.com"
      - key: PARTNER_SERVICE_URL
