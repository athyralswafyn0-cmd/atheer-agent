services:
  # === AUTH SERVICE ===
  - type: web
    name: auth-service
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: |
      cd services/auth-service && npm install && npx prisma generate && npm run build
    startCommand: |
      cd services/auth-service && npx prisma generate && PORT=3001 npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: HOST
        value: "0.0.0.0"
      - fromDatabase:
          name: auth-db
          property: connectionString
        key: DATABASE_URL
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.1-70b-versatile"
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: GOOGLE_AI_MODEL
        value: "gemini-1.5-flash"
      - key: EMBEDDING_PROVIDER
        value: "google"
      - key: EMBEDDING_MODEL
        value: "text-embedding-004"
      - key: REDIS_URL
        value: ""
      - key: FRONTEND_URL
        value: "https://www.atheersolutions.online"
      - key: CORS_ORIGINS
        value: "https://www.atheersolutions.online,https://atheersolutions.online"
    healthCheckPath: /health
    autoDeploy: true

