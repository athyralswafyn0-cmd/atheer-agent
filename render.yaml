# =============================================================================
# Atheer Agent AI - MONOLITH API DEPLOYMENT (Render Free Tier)
# =============================================================================
# Deploys: packages/api (Fastify + Prisma) as a single Web Service
# DB: Single PostgreSQL (Supabase or Render PostgreSQL)
# Dashboard & Widget → Deploy separately on Vercel
# =============================================================================

services:
  # === MONOLITH API ===
  - type: web
    name: atheer-api
    runtime: node
    plan: free
    region: frankfurt
    repo: https://github.com/YOUR_GITHUB_USERNAME/Atheer_Agent_Ai
    branch: main
    buildCommand: |
      cd packages/api && pnpm install --frozen-lockfile && pnpm exec prisma generate && pnpm run build
    startCommand: |
      cd packages/api && npx prisma migrate deploy && PORT=10000 pnpm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - fromDatabase:
          name: atheer-db
          property: connectionString
        key: DATABASE_URL
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: CORS_ORIGINS
        value: "https://www.atheersolutions.online,https://atheersolutions.online,https://dashboard.atheersolutions.online"
      - key: REDIS_URL
        value: ""  # Set if using Upstash Redis (free tier)
      # AI Providers (optional - add when needed)
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.1-70b-versatile"
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: GOOGLE_AI_MODEL
        value: "gemini-1.5-flash"
      - key: EMBEDDING_PROVIDER
        value: "google"
      - key: EMBEDDING_MODEL
        value: "text-embedding-004"
      # Email (optional)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: atheer-db
    databaseName: atheer_agent
    user: atheer_user
    plan: free
    region: frankfurt