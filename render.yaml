services:
  - type: web
    name: atheer-agent-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: |
      cd packages/api && pnpm install --frozen-lockfile && pnpm exec prisma generate && pnpm run build
    startCommand: |
      cd packages/api && npx prisma generate && npx prisma db push --force-reset --accept-data-loss && PORT=10000 pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - fromDatabase:
          name: atheer-db
          property: connectionString
        key: DATABASE_URL
      - key: JWT_SECRET
        value: "changemeinproductionpleasechange"
      - key: JWT_EXPIRES_IN
        value: "7d"
      # AI Providers - Groq (Free Llama 3.1 70B) + Google AI (Free Gemini 1.5 Flash)
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.1-70b-versatile"
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: GOOGLE_AI_MODEL
        value: "gemini-1.5-flash"
      # Embeddings via Google AI
      - key: EMBEDDING_PROVIDER
        value: "google"
      - key: EMBEDDING_MODEL
        value: "text-embedding-004"
      - key: REDIS_URL
        value: ""
      - key: FRONTEND_URL
        value: "https://www.atheersolutions.online"
      - key: WIDGET_CDN_URL
        value: "https://www.atheersolutions.online/widget"
      - key: CORS_ORIGINS
        value: "https://www.atheersolutions.online,https://atheersolutions.online"
    healthCheckPath: /health
    autoDeploy: true

