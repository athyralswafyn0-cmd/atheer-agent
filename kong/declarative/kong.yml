# ============================================================================
# KONG DECLARATIVE CONFIGURATION - ATHEER AGENT AI
# ============================================================================

# ============================================================================
# GLOBAL PLUGINS (Applied to all routes)
# ============================================================================

plugins:
  # Correlation ID for distributed tracing
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true

  # Security headers
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Correlation-ID
        - X-Request-ID
      exposed_headers:
        - X-Correlation-ID
        - X-Request-ID
      credentials: true
      max_age: 3600
      preflight_continue: false

  # Rate limiting (global fallback)
  - name: rate-limiting
    config:
      minute: 1000
      hour: 10000
      policy: local
      fault_tolerant: true
      hide_client_headers: false

